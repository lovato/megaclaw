version: '3'

tasks:
  build:
    desc: Build the OpenClaw container image
    cmds:
      - podman build --cgroup-manager=cgroupfs --security-opt label=disable -t openclaw-local .

  run:
    desc: Run the OpenClaw container
    cmds:
      - podman run -it --rm \
        --name openclaw \
        --ipc=host \
        -v ./db:/home/node/.openclaw \
        openclaw-local

  onboard:
    desc: Run onboarding for first-time setup
    cmds:
      - podman run -it -v ./db:/home/node/.openclaw openclaw-local openclaw onboard
