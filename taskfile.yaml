version: '3'

tasks:
  build:
    desc: Build the OpenClaw container image
    silent: true
    cmds:
      - ./scripts/build.sh

  run:
    desc: Run the OpenClaw container (interactive)
    silent: true
    preconditions:
      - sh: test -f ./db/openclaw.json -o -f ./db/openclaw.json5
        msg: "Error: /db is empty. Run 'task onboard' first."
    cmds:
      - ./scripts/run.sh

  start:
    desc: Start OpenClaw in the background
    silent: true
    preconditions:
      - sh: test -f ./db/openclaw.json -o -f ./db/openclaw.json5
        msg: "Error: /db is empty. Run 'task onboard' first."
    cmds:
      - ./scripts/run.sh daemon

  onboard:
    desc: Run onboarding for first-time setup
    silent: true
    cmds:
      - ./scripts/onboard.sh
      - echo "Onboarding complete! Run 'task run' to start OpenClaw."

  stop:
    desc: Stop the running container
    cmds:
      - podman stop openclaw

  ssh:
    desc: Jump into the container interactively (no openclaw running)
    cmds:
      - ./scripts/ssh.sh

  wipe:
    desc: Wipe the database (remove all config and data)
    silent: true
    cmds:
      - rm -rf ./db/*
      - echo "Database wiped. Run 'task onboard' to reconfigure."
