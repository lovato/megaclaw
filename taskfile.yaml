version: '3'

tasks:
  build:base:
    desc: Build the base image locally (slow — prefer pull:base on Pi)
    silent: true
    cmds:
      - ./scripts/build-base.sh
      - echo "Base image built! Run 'task build:runtime' to onboard."

  pull:base:
    desc: Pull the pre-built base image from GHCR (faster than building locally)
    cmds:
      - podman pull ghcr.io/lovato/megaclaw-base:latest
      - podman tag ghcr.io/lovato/megaclaw-base:latest megaclaw-base:latest
      - echo "Base image ready. Run 'task build:runtime' to onboard."

  build:runtime:
    desc: Run interactive onboarding and bake config into the runtime image (local only — never push)
    silent: true
    cmds:
      - ./scripts/build-runtime.sh
      - echo "Onboarding complete! Run 'task run' to start OpenClaw."

  run:
    desc: Run the OpenClaw Runtime container (interactive)
    silent: true
    preconditions:
      - sh: podman image exists megaclaw-runtime
        msg: "Error: Runtime image not found. Run 'task build:runtime' first."
    cmds:
      - ./scripts/run.sh

  start:
    desc: Start OpenClaw Runtime container in the background
    silent: true
    preconditions:
      - sh: podman image exists megaclaw-runtime
        msg: "Error: Runtime image not found. Run 'task build:runtime' first."
    cmds:
      - ./scripts/run.sh daemon

  stop:
    desc: Stop the Runtime container
    cmds:
      - podman stop openclaw

  ssh:base:
    desc: Jump into base container interactively
    cmds:
      - ./scripts/ssh-base.sh

  ssh:runtime:
    desc: Jump into runtime container interactively
    cmds:
      - ./scripts/ssh-runtime.sh

  test:
    desc: Run smoke tests (syntax check scripts, validate taskfile and Dockerfiles)
    cmds:
      - ./scripts/test-smoke.sh

  backup:create:
    desc: Zip db/ into megaclaw-db.zip (prompts for optional password)
    cmds:
      - ./scripts/backup-create.sh

  backup:restore:
    desc: Restore db/ from megaclaw-db.zip (db must be clean first)
    cmds:
      - ./scripts/backup-restore.sh

  wipe:
    desc: Wipe the database (remove all config and data)
    silent: true
    cmds:
      - rm -rf ./db/*
      - echo "Database wiped. Run 'task build:runtime' to reconfigure."
