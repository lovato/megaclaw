version: '3'

tasks:
  build:base:
    desc: Build the OpenClaw base container image
    silent: true
    cmds:
      - ./scripts/build-base.sh
      - echo "Base Image built! Run 'task build:runtime' to build OpenClaw runtime."

  build:runtime:
    desc: Build runtime image with onboarded config baked in
    silent: true
    cmds:
      - ./scripts/build-runtime.sh
      - echo "Onboarding complete! Run 'task run' to start OpenClaw."

  run:
    desc: Run the OpenClaw Runtime container (interactive)
    silent: true
    preconditions:
      - sh: test -f ./db/openclaw.json -o -f ./db/openclaw.json5
        msg: "Error: /db is empty. Run 'task build:runtime' first."
    cmds:
      - ./scripts/run.sh

  start:
    desc: Start OpenClaw Runtime container in the background
    silent: true
    preconditions:
      - sh: test -f ./db/openclaw.json -o -f ./db/openclaw.json5
        msg: "Error: /db is empty. Run 'task onboard' first."
    cmds:
      - ./scripts/run.sh daemon

  stop:
    desc: Stop the Runtime container
    cmds:
      - podman stop openclaw

  ssh:
    desc: Jump into the container interactively (no openclaw running)
    cmds:
      - ./scripts/ssh.sh

  wipe:
    desc: Wipe the database (remove all config and data)
    silent: true
    cmds:
      - rm -rf ./db/*
      - echo "Database wiped. Run 'task onboard' to reconfigure."
